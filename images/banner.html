<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 260px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .banner {
    width: 800px;
    height: 260px;
    background: linear-gradient(135deg, #f8f7ff 0%, #f0edff 40%, #ebe6ff 100%);
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 0 56px;
    overflow: hidden;
  }

  /* Soft ambient glow */
  .banner::before {
    content: '';
    position: absolute;
    top: -120px;
    right: 80px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.06) 0%, transparent 70%);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
  }

  .powered-by {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    padding: 5px 12px 5px 5px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 20px;
    font-size: 11px;
    color: #777;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .powered-by img {
    width: 22px;
    height: 22px;
    border-radius: 5px;
  }
  .powered-by .obsidian-img {
    background: #262626;
    border-radius: 5px;
    padding: 0;
  }
  .powered-by .echarts-img {
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 4px;
    border: 1px solid #eee;
    padding: 2px;
  }
  .powered-by .sep {
    width: 1px;
    height: 14px;
    background: #ddd;
  }

  .title {
    font-size: 36px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .title span {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 14px;
    color: #8888a0;
    font-weight: 400;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .tags {
    display: flex;
    gap: 8px;
  }
  .tag {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.1px;
  }
  .tag.data {
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(0,0,0,0.08);
    color: #444;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .tag.ai {
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: none;
    color: #fff;
    box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
  }
  .tag svg {
    flex-shrink: 0;
  }

  /* Right: chart illustration */
  .illustration {
    position: relative;
    z-index: 1;
    width: 240px;
    height: 180px;
    margin-right: -10px;
  }
  .illustration svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 8px rgba(124, 58, 237, 0.08));
  }

  /* Bottom accent */
  .banner::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #a78bfa, #7c3aed, #6d28d9, #7c3aed, #a78bfa);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="content">
    <div class="powered-by">
      <img class="obsidian-img" src="obsidian-icon.svg" alt="Obsidian">
      <span>Obsidian</span>
      <div class="sep"></div>
      <img class="echarts-img" src="echarts.png" alt="ECharts">
      <span>ECharts</span>
    </div>
    <div class="title">Bases <span>Chart Views</span></div>
    <div class="subtitle">Interactive chart views for Obsidian Bases</div>
    <div class="tags">
      <span class="tag data">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 17v-4"/><path d="M11 17V9"/><path d="M15 17v-6"/></svg>
        Data Charts
      </span>
      <span class="tag ai">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        AI Chart
      </span>
    </div>
  </div>

  <div class="illustration">
    <svg viewBox="0 0 240 180" fill="none">
      <!-- Grid -->
      <g stroke="#d4d0e8" stroke-width="0.5" opacity="0.5">
        <line x1="30" y1="145" x2="225" y2="145"/>
        <line x1="30" y1="115" x2="225" y2="115"/>
        <line x1="30" y1="85" x2="225" y2="85"/>
        <line x1="30" y1="55" x2="225" y2="55"/>
        <line x1="30" y1="25" x2="225" y2="25"/>
      </g>
      <!-- Bars -->
      <rect x="38" y="105" width="20" height="40" rx="3" fill="#c4b5fd" opacity="0.5"/>
      <rect x="68" y="75" width="20" height="70" rx="3" fill="#a78bfa" opacity="0.55"/>
      <rect x="98" y="88" width="20" height="57" rx="3" fill="#c4b5fd" opacity="0.5"/>
      <rect x="128" y="50" width="20" height="95" rx="3" fill="#8b5cf6" opacity="0.6"/>
      <rect x="158" y="68" width="20" height="77" rx="3" fill="#a78bfa" opacity="0.55"/>
      <rect x="188" y="35" width="20" height="110" rx="3" fill="#7c3aed" opacity="0.65"/>
      <!-- Line -->
      <polyline points="48,98 78,68 108,82 138,42 168,60 198,28"
        stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      <!-- Area fill -->
      <path d="M48,98 78,68 108,82 138,42 168,60 198,28 198,145 48,145Z"
        fill="url(#areaGrad)" opacity="0.15"/>
      <defs>
        <linearGradient id="areaGrad" x1="120" y1="28" x2="120" y2="145" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#7c3aed"/>
          <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Dots -->
      <circle cx="48" cy="98" r="4" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="78" cy="68" r="4" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="108" cy="82" r="4" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="138" cy="42" r="4" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="168" cy="60" r="4" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="198" cy="28" r="4" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
    </svg>
  </div>
</div>
</body>
</html>
